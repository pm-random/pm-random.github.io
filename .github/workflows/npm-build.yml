name: npm-build
on:
  push:
    branches: main
defaults:
  run:
    shell: bash
env:
  USER: 'pm-random'
  REPO: 'pm-random.github.io'
  BRANCH: 'gh-pages'
  MESSAGE: 'build'
jobs:
  build:
    runs-on: ubuntu-latest
    name: build
    steps:
    - uses: actions/checkout@v2
    - name: Clean install dependencies
      run: npm ci
    - name: Build
      run: npm run build
    - name: Create local repository
      run: |
        cd dist
        git init
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git branch "$BRANCH"
        git checkout "$BRANCH"
        git add -A
        git commit -m "$MESSAGE"
    - name: Push build to origin
      run: git push -f "https://$USER:${{ secrets.GITHUB_TOKEN }}@github.com/$USER/$REPO.git"
