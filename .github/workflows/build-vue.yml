# https://github.com/marketplace/actions/vue-to-github-pages

name: Build Vue App
on:
  push:
    branches: [main]
jobs:
  build_vue:
    runs-on: ubuntu-latest
    name: Build Vue
    steps:
    - uses: actions/checkout@v2
    - id: Build-Vue
      uses: xRealNeon/VuePagesAction@1.0.0
      with:
        username: 'pm-random'
        reponame: 'pm-random.github.io'
        token: ${{ secrets.GITHUB_TOKEN }} # Leave this line unchanged
        gitemail: 'cd@example.com'
        gitname: 'GitHub CD'
        gitmsg: 'Build Vue App'
